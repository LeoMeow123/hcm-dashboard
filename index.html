<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCM Monitor</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --green: #3fb950;
  --green-bg: #0d4429;
  --yellow: #d29922;
  --yellow-bg: #3d2e00;
  --red: #f85149;
  --red-bg: #4a1a1a;
  --blue: #58a6ff;
  --purple: #bc8cff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

header h1 {
  font-size: 24px;
  font-weight: 600;
}

header h1 span { color: var(--text-dim); font-weight: 400; }

.header-meta {
  color: var(--text-dim);
  font-size: 13px;
  text-align: right;
}

/* Summary cards */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}

.summary-card .label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.summary-card .value {
  font-size: 28px;
  font-weight: 600;
}

.summary-card .sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

.value.green { color: var(--green); }
.value.yellow { color: var(--yellow); }
.value.red { color: var(--red); }
.value.blue { color: var(--blue); }
.value.purple { color: var(--purple); }

/* Transfer alert banner */
.transfer-alert {
  background: var(--red-bg);
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 12px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
}

.transfer-alert.ok {
  background: var(--green-bg);
  border-color: var(--green);
}

.transfer-alert.warn {
  background: var(--yellow-bg);
  border-color: var(--yellow);
}

.transfer-alert .alert-icon { font-size: 20px; }

/* Progress bar */
.progress-bar {
  height: 6px;
  background: #1a1e24;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}

/* Inference indicator dot on calendar */
.day-cell .inf-dot {
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--purple);
}

.day-cell .inf-dot.partial {
  background: var(--purple);
  opacity: 0.5;
}

/* Calendar heatmap */
.calendar-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 24px;
  overflow-x: auto;
}

.calendar-section h2 {
  font-size: 16px;
  margin-bottom: 16px;
}

.calendar-grid {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.calendar-month {
  display: flex;
  align-items: center;
  gap: 2px;
}

.month-label {
  width: 70px;
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
  text-align: right;
  padding-right: 8px;
}

.day-cells {
  display: flex;
  gap: 2px;
  flex-wrap: nowrap;
}

.day-cell {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  cursor: pointer;
  transition: transform 0.1s, outline 0.1s;
  position: relative;
}

.day-cell:hover {
  transform: scale(1.4);
  z-index: 10;
  outline: 2px solid var(--text);
}

.day-cell.selected {
  outline: 2px solid var(--blue);
  transform: scale(1.3);
  z-index: 10;
}

.day-cell.empty {
  background: #1a1e24;
  cursor: default;
}

.day-cell.empty:hover { transform: none; outline: none; }

.day-cell.healthy { background: var(--green); }
.day-cell.degraded-light { background: #4d8a3f; }
.day-cell.degraded-medium { background: var(--yellow); }
.day-cell.degraded-heavy { background: #d46a18; }
.day-cell.crash-storm { background: var(--red); }
.day-cell.missing { background: #4a1a1a; }
.day-cell.no-data { background: var(--border); }

/* Calendar legend */
.calendar-legend {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-dim);
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 3px;
}

/* Day numbers header */
.day-numbers {
  display: flex;
  gap: 2px;
  margin-left: 78px;
  margin-bottom: 4px;
}

.day-num {
  width: 18px;
  text-align: center;
  font-size: 9px;
  color: var(--text-dim);
}

/* Detail panel */
.detail-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 24px;
  display: none;
}

.detail-panel.active { display: block; }

.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.detail-header h2 { font-size: 18px; }

.detail-nav {
  display: flex;
  gap: 8px;
}

.detail-nav button {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}

.detail-nav button:hover { border-color: var(--text-dim); }

.status-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.status-badge.healthy { background: var(--green-bg); color: var(--green); }
.status-badge.degraded { background: var(--yellow-bg); color: var(--yellow); }
.status-badge.missing { background: var(--red-bg); color: var(--red); }

/* Camera cards */
.camera-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 12px;
}

.camera-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}

.camera-card h3 {
  font-size: 14px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.camera-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.cam-stat {
  text-align: center;
}

.cam-stat .num {
  font-size: 20px;
  font-weight: 600;
}

.cam-stat .lbl {
  font-size: 11px;
  color: var(--text-dim);
}

/* Hour timeline */
.hour-timeline {
  display: flex;
  gap: 2px;
  margin-top: 8px;
}

.hour-block {
  flex: 1;
  height: 20px;
  border-radius: 2px;
  background: #1a1e24;
  position: relative;
}

.hour-block.covered { background: var(--green); }
.hour-block.covered-tiny { background: var(--yellow); }

.hour-labels {
  display: flex;
  gap: 2px;
  margin-top: 2px;
}

.hour-labels span {
  flex: 1;
  text-align: center;
  font-size: 9px;
  color: var(--text-dim);
}

/* Flags */
.flags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.flag {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--border);
  color: var(--text-dim);
}

.flag.crash_day { background: var(--yellow-bg); color: var(--yellow); }
.flag.crash_storm { background: var(--red-bg); color: var(--red); }
.flag.tiny_files { background: #3d2e00; color: #d29922; }
.flag.incomplete { background: #2a1f00; color: #b08800; }
.flag.no_videos { background: var(--red-bg); color: var(--red); }
.flag.empty_sessions { background: #3d1f00; color: #d27722; }
.flag.healthy { background: var(--green-bg); color: var(--green); }

/* Trend chart */
.trend-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 24px;
}

.trend-section h2 {
  font-size: 16px;
  margin-bottom: 16px;
}

.trend-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.trend-tab {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}

.trend-tab.active {
  border-color: var(--blue);
  color: var(--blue);
}

.chart-container {
  position: relative;
  height: 200px;
  overflow: hidden;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: #1c2128;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  pointer-events: none;
  z-index: 100;
  max-width: 250px;
  display: none;
}

.tooltip.visible { display: block; }

/* Loading */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-dim);
  font-size: 16px;
}

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 12px; }
  .summary-bar { grid-template-columns: repeat(2, 1fr); }
  .camera-grid { grid-template-columns: 1fr; }
  .day-cell { width: 14px; height: 14px; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>HCM Monitor <span>Recording Health</span></h1>
    <div class="header-meta">
      <div id="scan-time">Loading...</div>
      <div id="scan-range"></div>
    </div>
  </header>

  <div id="transfer-alert"></div>

  <div class="summary-bar" id="summary-bar"></div>

  <div class="calendar-section">
    <h2>Recording Calendar</h2>
    <div id="calendar"></div>
    <div class="calendar-legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--green)"></div> Healthy (24h all cams)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#4d8a3f"></div> Mostly OK (18-23h)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--yellow)"></div> Partial (6-17h)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#d46a18"></div> Poor (&lt;6h)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--red)"></div> Crash storm (50+ sessions)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--border)"></div> No data</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--purple);width:8px;height:8px;border-radius:50%"></div> Inference done</div>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h2><span id="detail-date"></span> <span id="detail-badge"></span></h2>
      <div class="detail-nav">
        <button onclick="navigateDay(-1)">&larr; Prev</button>
        <button onclick="navigateDay(1)">Next &rarr;</button>
        <button onclick="closeDetail()">&times; Close</button>
      </div>
    </div>
    <div id="detail-summary"></div>
    <div class="camera-grid" id="camera-grid"></div>
  </div>

  <div class="trend-section">
    <h2>Trends</h2>
    <div class="trend-tabs">
      <div class="trend-tab active" onclick="setTrend('coverage')">Hour Coverage</div>
      <div class="trend-tab" onclick="setTrend('sessions')">Sessions/Day</div>
      <div class="trend-tab" onclick="setTrend('videos')">Videos/Day</div>
      <div class="trend-tab" onclick="setTrend('tiny')">Tiny Files</div>
      <div class="trend-tab" onclick="setTrend('inference')">Inference Progress</div>
    </div>
    <div class="chart-container">
      <canvas id="trend-canvas"></canvas>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
let DATA = null;
let sortedDates = [];
let selectedDate = null;
let currentTrend = 'coverage';

async function loadData() {
  try {
    const resp = await fetch('hcm_daily_status.json');
    DATA = await resp.json();
    sortedDates = Object.keys(DATA.dates).sort();
    render();
  } catch (e) {
    document.getElementById('summary-bar').innerHTML =
      `<div class="loading">Failed to load hcm_daily_status.json — run scan_daily.py first</div>`;
  }
}

function render() {
  renderTransferAlert();
  renderHeader();
  renderSummary();
  renderCalendar();
  renderTrend();
}

function renderHeader() {
  const info = DATA.scan_info;
  const scanDate = new Date(info.last_scan);
  document.getElementById('scan-time').textContent =
    `Last scan: ${scanDate.toLocaleDateString()} ${scanDate.toLocaleTimeString()}`;
  document.getElementById('scan-range').textContent =
    `${info.date_range.first} to ${info.date_range.last} (${info.total_dates} days)`;
}

function renderTransferAlert() {
  const transfer = DATA.scan_info.transfer;
  if (!transfer) {
    document.getElementById('transfer-alert').innerHTML = '';
    return;
  }

  const today = new Date().toISOString().slice(0, 10);
  let maxBehind = 0;
  let details = [];
  for (const [cam, info] of Object.entries(transfer)) {
    const behind = info.days_behind ?? 999;
    maxBehind = Math.max(maxBehind, behind);
    details.push(`${cam}: ${info.latest_date} (${behind}d ago)`);
  }

  let cls, icon, msg;
  if (maxBehind <= 1) {
    cls = 'ok'; icon = '&#10003;';
    msg = `Transfer OK — all cameras have data from ${Object.values(transfer)[0]?.latest_date || 'unknown'}`;
  } else if (maxBehind <= 3) {
    cls = 'warn'; icon = '&#9888;';
    msg = `Transfer delayed — latest data is ${maxBehind} days old. Check robocopy.`;
  } else {
    cls = ''; icon = '&#10060;';
    msg = `Transfer stale — no new data for ${maxBehind} days! Recording or transfer may be down.`;
  }

  document.getElementById('transfer-alert').innerHTML = `
    <div class="transfer-alert ${cls}">
      <span class="alert-icon">${icon}</span>
      <div>
        <strong>${msg}</strong>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${details.join(' | ')}</div>
      </div>
    </div>`;
}

function renderSummary() {
  const info = DATA.scan_info;
  const o = info.overall;

  // Compute totals
  let totalHours = 0, expectedHours = sortedDates.length * 24 * 4;
  let totalTiny = 0, totalSessions = 0, totalVideos = 0;
  for (const d of sortedDates) {
    const day = DATA.dates[d];
    for (const cam of ['cam_01','cam_02','cam_03','cam_04']) {
      if (day.cameras[cam]) {
        totalHours += day.cameras[cam].hours_count;
        totalTiny += day.cameras[cam].tiny_files;
        totalSessions += day.cameras[cam].sessions;
        totalVideos += day.cameras[cam].videos;
      }
    }
  }

  const coverage = ((totalHours / expectedHours) * 100).toFixed(1);
  const healthyPct = ((o.healthy_days / info.total_dates) * 100).toFixed(0);

  const infDone = o.inference_videos_done || 0;
  const infTotal = o.inference_videos_total || 1;
  const infPct = (infDone / infTotal * 100).toFixed(1);
  const infDates = o.inference_complete_dates || 0;

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card">
      <div class="label">Recording Days</div>
      <div class="value blue">${info.total_dates}</div>
      <div class="sub">${info.date_range.first} to ${info.date_range.last}</div>
    </div>
    <div class="summary-card">
      <div class="label">Hour Coverage</div>
      <div class="value ${coverage > 80 ? 'green' : coverage > 50 ? 'yellow' : 'red'}">${coverage}%</div>
      <div class="sub">${totalHours.toLocaleString()} / ${expectedHours.toLocaleString()} camera-hours</div>
    </div>
    <div class="summary-card">
      <div class="label">Healthy Days</div>
      <div class="value ${healthyPct > 50 ? 'green' : 'red'}">${o.healthy_days}</div>
      <div class="sub">${healthyPct}% of all days</div>
    </div>
    <div class="summary-card">
      <div class="label">Degraded Days</div>
      <div class="value yellow">${o.degraded_days}</div>
      <div class="sub">${(o.degraded_days / info.total_dates * 100).toFixed(0)}% of all days</div>
    </div>
    <div class="summary-card">
      <div class="label">Inference Progress</div>
      <div class="value purple">${infPct}%</div>
      <div class="sub">${infDone.toLocaleString()} / ${infTotal.toLocaleString()} videos</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${infPct}%;background:var(--purple)"></div></div>
    </div>
    <div class="summary-card">
      <div class="label">Inference Complete</div>
      <div class="value purple">${infDates}</div>
      <div class="sub">${(infDates / info.total_dates * 100).toFixed(0)}% of dates fully done</div>
    </div>
    <div class="summary-card">
      <div class="label">Crash Artifacts</div>
      <div class="value red">${totalTiny.toLocaleString()}</div>
      <div class="sub">Tiny files &lt;1MB (${(totalTiny/totalVideos*100).toFixed(0)}% of all videos)</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Sessions</div>
      <div class="value">${totalSessions.toLocaleString()}</div>
      <div class="sub">Expected ${(sortedDates.length * 4).toLocaleString()} (${Math.round(totalSessions / (sortedDates.length * 4))}x excess)</div>
    </div>
  `;
}

function renderCalendar() {
  // Group dates by month
  const months = {};
  const allMonths = new Set();

  // Build full month range
  if (sortedDates.length === 0) return;
  const firstDate = new Date(sortedDates[0] + 'T00:00:00');
  const lastDate = new Date(sortedDates[sortedDates.length - 1] + 'T00:00:00');

  let cursor = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
  while (cursor <= lastDate) {
    const key = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}`;
    months[key] = {};
    cursor.setMonth(cursor.getMonth() + 1);
  }

  // Fill in dates
  for (const d of sortedDates) {
    const [y, m, dd] = d.split('-');
    const monthKey = `${y}-${m}`;
    if (months[monthKey]) months[monthKey][parseInt(dd)] = DATA.dates[d];
  }

  // Day number header
  let html = '<div class="day-numbers">';
  for (let i = 1; i <= 31; i++) {
    html += `<div class="day-num">${i}</div>`;
  }
  html += '</div><div class="calendar-grid">';

  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  for (const monthKey of Object.keys(months).sort()) {
    const [y, m] = monthKey.split('-');
    const daysInMonth = new Date(parseInt(y), parseInt(m), 0).getDate();
    const monthData = months[monthKey];

    html += `<div class="calendar-month">`;
    html += `<div class="month-label">${monthNames[parseInt(m)-1]} ${y}</div>`;
    html += `<div class="day-cells">`;

    for (let d = 1; d <= 31; d++) {
      if (d > daysInMonth) {
        html += `<div class="day-cell empty"></div>`;
        continue;
      }

      const dateStr = `${y}-${m}-${String(d).padStart(2, '0')}`;
      const dayData = monthData[d];

      if (!dayData) {
        // Check if date is within recording range
        const dt = new Date(dateStr + 'T00:00:00');
        if (dt >= firstDate && dt <= lastDate) {
          html += `<div class="day-cell no-data" data-date="${dateStr}"
            onmouseenter="showTooltip(event,'${dateStr}: No data')"
            onmouseleave="hideTooltip()"
            onclick="selectDate('${dateStr}')"></div>`;
        } else {
          html += `<div class="day-cell empty"></div>`;
        }
        continue;
      }

      const summary = dayData.summary;
      const avgHours = summary.cameras_present > 0 ?
        Object.values(dayData.cameras).reduce((s,c) => s + c.hours_count, 0) / summary.cameras_present : 0;
      const maxSessions = summary.max_sessions_any_cam;

      let cls = 'no-data';
      if (maxSessions > 50) cls = 'crash-storm';
      else if (summary.status === 'healthy') cls = 'healthy';
      else if (avgHours >= 18) cls = 'degraded-light';
      else if (avgHours >= 6) cls = 'degraded-medium';
      else cls = 'degraded-heavy';

      const inf = summary.inference || {};
      const infComplete = inf.complete;
      const infPartial = inf.videos_done > 0 && !infComplete;
      const infTip = inf.videos_done ? ` | Inference: ${inf.videos_done}/${inf.videos_total} videos` : '';

      const tip = `${dateStr}: ${summary.status} — ${summary.total_videos} videos, ${summary.total_sessions} sessions, avg ${avgHours.toFixed(0)}h coverage${infTip}`;

      const infDot = infComplete ? '<div class="inf-dot"></div>' :
                     infPartial ? '<div class="inf-dot partial"></div>' : '';

      html += `<div class="day-cell ${cls}" data-date="${dateStr}"
        onmouseenter="showTooltip(event,\`${tip}\`)"
        onmouseleave="hideTooltip()"
        onclick="selectDate('${dateStr}')">${infDot}</div>`;
    }

    html += `</div></div>`;
  }

  html += '</div>';
  document.getElementById('calendar').innerHTML = html;
}

function selectDate(dateStr) {
  selectedDate = dateStr;

  // Update calendar selection
  document.querySelectorAll('.day-cell.selected').forEach(el => el.classList.remove('selected'));
  const cell = document.querySelector(`.day-cell[data-date="${dateStr}"]`);
  if (cell) cell.classList.add('selected');

  renderDetail(dateStr);
}

function navigateDay(offset) {
  if (!selectedDate) return;
  const idx = sortedDates.indexOf(selectedDate);
  if (idx === -1) {
    // Find nearest date
    const target = selectedDate;
    let nearest = sortedDates[0];
    for (const d of sortedDates) {
      if (d <= target) nearest = d;
    }
    selectDate(nearest);
    return;
  }
  const newIdx = Math.max(0, Math.min(sortedDates.length - 1, idx + offset));
  selectDate(sortedDates[newIdx]);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('active');
  document.querySelectorAll('.day-cell.selected').forEach(el => el.classList.remove('selected'));
  selectedDate = null;
}

function renderDetail(dateStr) {
  const panel = document.getElementById('detail-panel');
  panel.classList.add('active');

  const day = DATA.dates[dateStr];
  if (!day) {
    document.getElementById('detail-date').textContent = dateStr;
    document.getElementById('detail-badge').innerHTML =
      '<span class="status-badge missing">No Data</span>';
    document.getElementById('detail-summary').innerHTML =
      '<p style="color:var(--text-dim);margin-bottom:12px">No recording data for this date.</p>';
    document.getElementById('camera-grid').innerHTML = '';
    return;
  }

  const summary = day.summary;
  document.getElementById('detail-date').textContent = dateStr;
  document.getElementById('detail-badge').innerHTML =
    `<span class="status-badge ${summary.status}">${summary.status}</span>`;

  const inf = summary.inference || {};
  const infLine = inf.videos_done != null
    ? `<br>Inference: ${inf.videos_done}/${inf.videos_total} videos ${inf.complete ? '<span class="status-badge healthy">Complete</span>' : `<span style="color:var(--purple)">(${(inf.videos_done/Math.max(inf.videos_total,1)*100).toFixed(0)}%)</span>`}`
    : '';

  document.getElementById('detail-summary').innerHTML = `
    <p style="color:var(--text-dim);margin-bottom:12px">
      ${summary.total_videos} videos across ${summary.total_sessions} sessions,
      ${summary.cameras_present}/4 cameras
      ${summary.cameras_missing.length ? ` (missing: ${summary.cameras_missing.join(', ')})` : ''}
      — ${summary.total_mb.toLocaleString()} MB total
      ${infLine}
    </p>
  `;

  let camHtml = '';
  for (const cam of ['cam_01','cam_02','cam_03','cam_04']) {
    const c = day.cameras[cam];
    if (!c) {
      camHtml += `
        <div class="camera-card">
          <h3>${cam} <span class="status-badge missing">Missing</span></h3>
          <p style="color:var(--text-dim)">No data for this camera on this date.</p>
        </div>`;
      continue;
    }

    // Hour timeline
    let timelineHtml = '<div class="hour-timeline">';
    for (let h = 0; h < 24; h++) {
      const covered = c.hours_covered.includes(h);
      // Check if the video at this hour is tiny (we'd need per-video data, approximate)
      timelineHtml += `<div class="hour-block ${covered ? 'covered' : ''}" title="Hour ${h}: ${covered ? 'recorded' : 'missing'}"></div>`;
    }
    timelineHtml += '</div>';

    let labelsHtml = '<div class="hour-labels">';
    for (let h = 0; h < 24; h++) {
      labelsHtml += `<span>${h % 6 === 0 ? h : ''}</span>`;
    }
    labelsHtml += '</div>';

    // Flags
    let flagsHtml = '';
    if (c.flags && c.flags.length) {
      flagsHtml = '<div class="flags">' +
        c.flags.map(f => `<span class="flag ${f}">${f.replace(/_/g,' ')}</span>`).join('') +
        '</div>';
    }

    camHtml += `
      <div class="camera-card">
        <h3>${cam}
          ${c.flags && c.flags.includes('healthy') ?
            '<span class="status-badge healthy">Healthy</span>' :
            `<span style="color:var(--text-dim);font-weight:400;font-size:12px">${c.hours_count}/24 hours</span>`}
        </h3>
        <div class="camera-stats">
          <div class="cam-stat">
            <div class="num" style="color:${c.videos === 24 ? 'var(--green)' : c.videos > 0 ? 'var(--yellow)' : 'var(--red)'}">${c.videos}</div>
            <div class="lbl">Videos</div>
          </div>
          <div class="cam-stat">
            <div class="num" style="color:${c.sessions === 1 ? 'var(--green)' : c.sessions > 50 ? 'var(--red)' : 'var(--yellow)'}">${c.sessions}</div>
            <div class="lbl">Sessions</div>
          </div>
          <div class="cam-stat">
            <div class="num">${c.total_mb}</div>
            <div class="lbl">MB</div>
          </div>
        </div>
        <div class="camera-stats">
          <div class="cam-stat">
            <div class="num" style="color:${c.tiny_files === 0 ? 'var(--green)' : 'var(--red)'}">${c.tiny_files}</div>
            <div class="lbl">Tiny files</div>
          </div>
          <div class="cam-stat">
            <div class="num" style="color:${c.empty_sessions === 0 ? 'var(--green)' : 'var(--red)'}">${c.empty_sessions}</div>
            <div class="lbl">Empty sessions</div>
          </div>
          <div class="cam-stat">
            <div class="num" style="color:${c.hours_count === 24 ? 'var(--green)' : 'var(--yellow)'}">${c.hours_count}</div>
            <div class="lbl">Hours covered</div>
          </div>
        </div>
        ${timelineHtml}
        ${labelsHtml}
        ${c.inference ? (() => {
          const infVids = c.inference.videos_done;
          const recVids = c.videos || 0;
          const infSess = c.inference.sessions_done;
          const recSess = c.sessions || 0;
          const pct = recVids > 0 ? (infVids / recVids * 100) : 0;
          const done = infVids >= recVids && recVids > 0;
          return `
          <div style="margin-top:8px;padding:6px 8px;background:rgba(188,140,255,0.08);border-radius:4px;font-size:12px">
            <span style="color:var(--purple);font-weight:600">Inference:</span>
            ${infVids} / ${recVids} videos (${infSess} / ${recSess} sessions)
            ${done ? '<span style="color:var(--green)"> &#10003; Done</span>' : `<span style="color:var(--text-dim)"> ${pct.toFixed(0)}%</span>`}
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct, 100)}%;background:var(--purple)"></div></div>
          </div>`;
        })() : ''}
        ${flagsHtml}
      </div>`;
  }

  document.getElementById('camera-grid').innerHTML = camHtml;

  // Scroll detail into view
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Trend chart
function setTrend(type) {
  currentTrend = type;
  document.querySelectorAll('.trend-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderTrend();
}

function renderTrend() {
  const canvas = document.getElementById('trend-canvas');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();

  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const W = rect.width;
  const H = rect.height;
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  // Extract data series
  const values = sortedDates.map(d => {
    const day = DATA.dates[d];
    const cams = Object.values(day.cameras);
    switch (currentTrend) {
      case 'coverage':
        return cams.length ? cams.reduce((s,c) => s + c.hours_count, 0) / (4 * 24) * 100 : 0;
      case 'sessions':
        return day.summary.total_sessions;
      case 'videos':
        return day.summary.total_videos;
      case 'tiny':
        return cams.reduce((s,c) => s + (c.tiny_files || 0), 0);
      case 'inference':
        const dinf = day.summary.inference || {};
        return dinf.videos_total > 0 ? (dinf.videos_done / dinf.videos_total * 100) : 0;
      default:
        return 0;
    }
  });

  const maxVal = Math.max(...values, 1);
  const yLabel = {
    coverage: '% Coverage',
    sessions: 'Sessions',
    videos: 'Videos',
    tiny: 'Tiny Files',
    inference: '% Inference Done'
  }[currentTrend];

  // Grid lines
  ctx.strokeStyle = '#1a1e24';
  ctx.lineWidth = 1;
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const y = pad.top + plotH - (i / yTicks) * plotH;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + plotW, y);
    ctx.stroke();

    ctx.fillStyle = '#8b949e';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    const label = currentTrend === 'coverage'
      ? `${(maxVal * i / yTicks).toFixed(0)}%`
      : Math.round(maxVal * i / yTicks);
    ctx.fillText(label, pad.left - 8, y + 4);
  }

  // X-axis labels (every ~3 months)
  const labelInterval = Math.max(1, Math.floor(sortedDates.length / 8));
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < sortedDates.length; i += labelInterval) {
    const x = pad.left + (i / (sortedDates.length - 1)) * plotW;
    ctx.fillText(sortedDates[i].slice(0, 7), x, H - 6);
  }

  // Draw bars or line
  if (currentTrend === 'coverage' || currentTrend === 'inference') {
    const lineColor = currentTrend === 'inference' ? '#bc8cff' : '#3fb950';
    // Line chart with fill
    ctx.beginPath();
    const points = values.map((v, i) => ({
      x: pad.left + (i / (values.length - 1)) * plotW,
      y: pad.top + plotH - (v / maxVal) * plotH
    }));

    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Fill
    ctx.lineTo(points[points.length-1].x, pad.top + plotH);
    ctx.lineTo(points[0].x, pad.top + plotH);
    ctx.closePath();
    const rgb = currentTrend === 'inference' ? '188, 140, 255' : '63, 185, 80';
    ctx.fillStyle = `rgba(${rgb}, 0.1)`;
    ctx.fill();

    // Reference line at 100%
    if (maxVal >= 100) {
      const y100 = pad.top + plotH - (100 / maxVal) * plotH;
      ctx.strokeStyle = `rgba(${rgb}, 0.3)`;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(pad.left, y100);
      ctx.lineTo(pad.left + plotW, y100);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  } else {
    // Bar chart
    const barW = Math.max(1, plotW / values.length - 0.5);
    for (let i = 0; i < values.length; i++) {
      const x = pad.left + (i / values.length) * plotW;
      const barH = (values[i] / maxVal) * plotH;
      const y = pad.top + plotH - barH;

      let color;
      if (currentTrend === 'sessions') {
        color = values[i] <= 4 ? '#3fb950' : values[i] <= 50 ? '#d29922' : '#f85149';
      } else if (currentTrend === 'videos') {
        color = values[i] >= 90 ? '#3fb950' : values[i] >= 24 ? '#d29922' : '#f85149';
      } else {
        color = values[i] === 0 ? '#3fb950' : values[i] < 10 ? '#d29922' : '#f85149';
      }

      ctx.fillStyle = color;
      ctx.fillRect(x, y, barW, barH);
    }
  }

  // Y-axis label
  ctx.save();
  ctx.translate(12, pad.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#8b949e';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(yLabel, 0, 0);
  ctx.restore();
}

// Tooltip
function showTooltip(e, text) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.classList.add('visible');
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 8) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// Resize handler
window.addEventListener('resize', () => {
  if (DATA) renderTrend();
});

// Load
loadData();
</script>
